<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Proyecter</title>
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/128/3248/3248150.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  background: #1a1a2e; color: #e0e0e0;
}

/* ── Tab bar ── */
#tab-bar {
  display: flex; align-items: flex-end; gap: 2px;
  background: #0f0f22; padding: 8px 8px 0;
  border-bottom: 2px solid #2a2a4a; min-height: 42px; flex-shrink: 0;
  overflow-x: auto; overflow-y: hidden;
}
#tab-bar::-webkit-scrollbar { height: 3px; }
#tab-bar::-webkit-scrollbar-thumb { background: #3a3a5a; border-radius: 2px; }
.tab {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 14px 7px; background: #1a1a3a;
  border-radius: 8px 8px 0 0; cursor: pointer;
  font-size: 13px; color: #888; border: 1px solid #2a2a4a;
  border-bottom: none; user-select: none; flex-shrink: 0; max-width: 180px;
  transition: background 0.15s, color 0.15s;
}
.tab:hover { background: #22224a; color: #bbb; }
.tab.active { background: #1e1e3f; color: #fff; border-color: #3a3a6a; }
.tab-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; outline: none; }
.tab-close {
  opacity: 0; font-size: 15px; line-height: 1; width: 18px; height: 18px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 4px; transition: opacity 0.15s, background 0.15s;
}
.tab:hover .tab-close { opacity: 0.5; }
.tab-close:hover { opacity: 1 !important; background: #c0392b; color: #fff; }
#tab-add {
  padding: 4px 12px 7px; background: none; border: none; color: #666;
  cursor: pointer; font-size: 22px; line-height: 1; border-radius: 6px 6px 0 0;
  transition: color 0.15s, background 0.15s; flex-shrink: 0;
}
#tab-add:hover { background: #1a1a3a; color: #aaa; }

/* ── Toolbar ── */
#toolbar {
  display: flex; align-items: center; gap: 4px;
  background: #0f0f22; padding: 6px 10px;
  border-bottom: 1px solid #1e1e3a; flex-shrink: 0;
}
.tool-btn {
  padding: 5px 11px; background: #1e1e3a; border: 1px solid #2a2a4a;
  border-radius: 6px; color: #aaa; cursor: pointer; font-size: 12px;
  display: flex; align-items: center; gap: 5px; white-space: nowrap;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}
.tool-btn:hover { background: #2a2a4a; color: #ddd; border-color: #3a3a5a; }
.tool-btn.active { background: #3a3aff; border-color: #5555ff; color: #fff; }
.tool-sep { width: 1px; height: 22px; background: #2a2a4a; margin: 0 2px; }
#toolbar-hint { margin-left: auto; font-size: 11px; color: #444; }

/* ── Canvas ── */
#canvas-wrapper {
  flex: 1; overflow: hidden; position: relative; background: #1a1a2e;
  background-image: radial-gradient(circle, #252545 1px, transparent 1px);
  background-size: 20px 20px; cursor: default;
}
#canvas {
  position: absolute; top: 0; left: 0;
  transform-origin: 0 0; width: 6000px; height: 6000px;
}
#arrows-layer {
  position: absolute; top: 0; left: 0;
  width: 6000px; height: 6000px;
  pointer-events: none; overflow: visible;
}
#nodes-layer {
  position: absolute; top: 0; left: 0;
  width: 6000px; height: 6000px;
}

/* ── Nodes ── */
.node {
  position: absolute; min-width: 100px; min-height: 50px;
  border: 2px solid #555; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; user-select: none;
  transition: box-shadow 0.12s;
}
.node:hover { box-shadow: 0 0 0 2px #5555ff88; }
.node.selected { box-shadow: 0 0 0 3px #5555ff; }
.node.collapsed { border-style: dashed; opacity: 0.9; }
.node.highlighted { animation: nodePulse 0.7s ease-in-out 3; }
@keyframes nodePulse {
  0%,100% { box-shadow: 0 0 0 2px #ffaa00; }
  50%      { box-shadow: 0 0 0 10px #ffaa0044; }
}

.node-label {
  outline: none; text-align: center; padding: 10px 16px;
  font-size: 14px; line-height: 1.4; word-break: break-word;
  min-width: 60px; pointer-events: none; color: inherit;
}
.node-label[contenteditable="true"] {
  pointer-events: all; cursor: text;
  background: rgba(255,255,255,0.15); border-radius: 4px;
}

/* Connection handles */
.handle {
  position: absolute; width: 13px; height: 13px;
  background: #4a4aff; border: 2px solid #fff; border-radius: 50%;
  cursor: crosshair; opacity: 0; transition: opacity 0.12s; z-index: 10;
}
.node:hover .handle { opacity: 1; }
.handle.h-top    { top: -7px;    left: 50%;  transform: translateX(-50%); }
.handle.h-bottom { bottom: -7px; left: 50%;  transform: translateX(-50%); }
.handle.h-left   { left: -7px;   top: 50%;   transform: translateY(-50%); }
.handle.h-right  { right: -7px;  top: 50%;   transform: translateY(-50%); }

/* Collapse badge */
.node-badge {
  position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
  background: #444; color: #ddd; border-radius: 10px;
  font-size: 11px; padding: 2px 8px; display: none;
  pointer-events: none; white-space: nowrap; z-index: 5;
  border: 1px solid #555;
}
.node.collapsed .node-badge { display: block; }

/* Cross-tab badges */
.crosstab-out-badge {
  position: absolute; top: -14px; right: 6px;
  background: #e67e22; color: #fff; border-radius: 10px;
  font-size: 10px; padding: 2px 7px; cursor: pointer; z-index: 20;
  white-space: nowrap; border: 1px solid #f39c12;
  transition: background 0.12s;
}
.crosstab-out-badge:hover { background: #f39c12; }
.crosstab-in-badge {
  position: absolute; top: -14px; left: 6px;
  background: #2980b9; color: #fff; border-radius: 10px;
  font-size: 10px; padding: 2px 7px; z-index: 20;
  white-space: nowrap; border: 1px solid #3498db;
  pointer-events: none;
}

/* ── Context menu ── */
#context-menu {
  position: fixed; background: #161628; border: 1px solid #3a3a5a;
  border-radius: 10px; padding: 6px 0; z-index: 9000;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6); min-width: 168px; display: none;
}
.ctx-item {
  padding: 9px 16px; cursor: pointer; font-size: 13px; color: #bbb;
  transition: background 0.1s, color 0.1s;
}
.ctx-item:hover { background: #2a2a4a; color: #fff; }
.ctx-item.danger { color: #e74c3c; }
.ctx-item.danger:hover { background: #2a1a1a; color: #ff6b6b; }
.ctx-sep { height: 1px; background: #2a2a4a; margin: 4px 0; }
.ctx-label { padding: 6px 16px 2px; font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.08em; }
.color-palette {
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px;
  padding: 6px 12px 8px;
}
.color-swatch {
  width: 22px; height: 22px; border-radius: 5px; cursor: pointer;
  border: 2px solid transparent; transition: transform 0.1s, border-color 0.1s;
}
.color-swatch:hover { border-color: #fff; transform: scale(1.15); }
.ctx-color-row { display: flex; align-items: center; gap: 6px; padding: 0 12px 8px; }
.ctx-color-row label { font-size: 11px; color: #666; }
#ctx-color-input {
  flex: 1; padding: 4px 7px; background: #1e1e3a; border: 1px solid #3a3a5a;
  border-radius: 5px; color: #ddd; font-size: 12px; outline: none;
}
#ctx-color-input:focus { border-color: #5555ff; }

/* ── Modal ── */
#modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.65);
  display: none; align-items: center; justify-content: center; z-index: 10000;
}
#modal-overlay.open { display: flex; }
#modal {
  background: #161628; border: 1px solid #3a3a5a; border-radius: 14px;
  padding: 28px; width: 360px; max-width: 95vw;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
}
#modal h2 { font-size: 15px; margin-bottom: 18px; color: #eee; }
.modal-field { margin-bottom: 14px; }
.modal-field label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.06em; }
.modal-field select {
  width: 100%; padding: 9px 10px; background: #1e1e3a; border: 1px solid #3a3a5a;
  border-radius: 7px; color: #ddd; font-size: 14px; outline: none;
  appearance: none;
}
.modal-field select:focus { border-color: #5555ff; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.btn { padding: 8px 18px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; transition: background 0.12s; }
.btn-primary { background: #3a3aff; color: #fff; }
.btn-primary:hover { background: #5555ff; }
.btn-secondary { background: #1e1e3a; color: #aaa; border: 1px solid #3a3a5a; }
.btn-secondary:hover { background: #2a2a4a; color: #ddd; }

/* Arrow preview */
#arrow-preview { pointer-events: none; }
</style>
</head>
<body>

<div id="tab-bar">
  <button id="tab-add" title="Nuevo diagrama (Ctrl+T)">+</button>
</div>

<div id="toolbar">
  <button class="tool-btn active" id="tool-select" title="Seleccionar / Mover (V)">▶ Seleccionar</button>
  <button class="tool-btn" id="tool-pan" title="Mover canvas (H / Espacio)">✋ Pan</button>
  <div class="tool-sep"></div>
  <button class="tool-btn" id="btn-undo" title="Deshacer (Ctrl+Z)">↩ Undo</button>
  <button class="tool-btn" id="btn-redo" title="Rehacer (Ctrl+Y)">↪ Redo</button>
  <div class="tool-sep"></div>
  <button class="tool-btn" id="btn-delete" title="Eliminar selección (Delete)">🗑 Eliminar</button>
  <div class="tool-sep"></div>
  <button class="tool-btn" id="btn-fit" title="Ajustar vista (Ctrl+Shift+H)">⊡ Ajustar</button>
  <span id="toolbar-hint">Doble-click en canvas → nuevo nodo &nbsp;·&nbsp; Arrastrar borde de nodo → flecha &nbsp;·&nbsp; ⌘+click en nodo → colapsar/expandir hijos</span>
</div>

<div id="canvas-wrapper">
  <div id="canvas">
    <svg id="arrows-layer" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
        </marker>
        <marker id="arr-hover" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
        </marker>
      </defs>
      <g id="edges-group"></g>
      <path id="arrow-preview" d="" stroke="#5555ff" stroke-width="2"
            fill="none" stroke-dasharray="7,4" marker-end="url(#arr)"/>
    </svg>
    <div id="nodes-layer"></div>
  </div>
</div>

<!-- Context menu -->
<div id="context-menu">
  <div class="ctx-item" id="ctx-edit">✏️ Editar texto</div>
  <div class="ctx-item" id="ctx-crosstab">↗ Link a otra pestaña</div>
  <div class="ctx-sep"></div>
  <div class="ctx-label">Color de fondo</div>
  <div class="color-palette" id="ctx-colors"></div>
  <div class="ctx-color-row">
    <label>Hex</label>
    <input type="text" id="ctx-color-input" placeholder="#ffffff" maxlength="7">
  </div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" id="ctx-delete">🗑 Eliminar nodo</div>
</div>

<!-- Cross-tab modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2>↗ Linkar a nodo en otra pestaña</h2>
    <div class="modal-field">
      <label>Pestaña destino</label>
      <select id="modal-tab-select"></select>
    </div>
    <div class="modal-field">
      <label>Nodo destino</label>
      <select id="modal-node-select"></select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="modal-cancel">Cancelar</button>
      <button class="btn btn-primary" id="modal-confirm">Crear link</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const GRID = 20;
const NODE_W = 160;
const NODE_H = 60;
const COLORS = [
  '#ffffff','#ffeeba','#d4f5d4','#cce5ff',
  '#f8d7da','#e2d9f3','#ffd6a5','#b7e4c7',
  '#ade8f4','#ffb3c1','#c8b6ff','#d0d0d0'
];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let state = { diagrams: [], activeDiagramId: null };
let undoStack = [];
let redoStack = [];

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function activeDiagram() {
  return state.diagrams.find(d => d.id === state.activeDiagramId) || state.diagrams[0];
}

let _saveTimer = null;
function save() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    fetch('/api/state', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state)
    }).catch(() => {});
  }, 500);
}

async function load() {
  try {
    const res = await fetch('/api/state');
    if (res.ok) {
      const data = await res.json();
      if (data) state = data;
    }
  } catch (_) {}
  if (!Array.isArray(state.diagrams) || !state.diagrams.length) {
    const d = makeDiagram('Diagrama 1');
    state = { diagrams: [d], activeDiagramId: d.id };
  }
  if (!state.diagrams.find(d => d.id === state.activeDiagramId)) {
    state.activeDiagramId = state.diagrams[0].id;
  }
}

function makeDiagram(name) {
  return { id: uid(), name, nodes: [], edges: [] };
}

function deepClone(x) { return JSON.parse(JSON.stringify(x)); }

// ═══════════════════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════════════════
function pushHistory() {
  undoStack.push(deepClone(state));
  if (undoStack.length > 50) undoStack.shift();
  redoStack = [];
}

function undo() {
  if (!undoStack.length) return;
  redoStack.push(deepClone(state));
  state = undoStack.pop();
  save(); render(); renderTabs();
}

function redo() {
  if (!redoStack.length) return;
  undoStack.push(deepClone(state));
  state = redoStack.pop();
  save(); render(); renderTabs();
}

// ═══════════════════════════════════════════════════════════
// VIEWPORT
// ═══════════════════════════════════════════════════════════
let vp = { x: 200, y: 100, scale: 1 };

function applyVP() {
  document.getElementById('canvas').style.transform =
    `translate(${vp.x}px,${vp.y}px) scale(${vp.scale})`;
}

function screenToCanvas(sx, sy) {
  const r = document.getElementById('canvas-wrapper').getBoundingClientRect();
  return { x: (sx - r.left - vp.x) / vp.scale, y: (sy - r.top - vp.y) / vp.scale };
}

function fitView() {
  const diag = activeDiagram();
  if (!diag.nodes.length) { vp = { x: 200, y: 100, scale: 1 }; applyVP(); return; }
  const visible = diag.nodes.filter(n => !isHidden(diag, n.id));
  if (!visible.length) { vp = { x: 200, y: 100, scale: 1 }; applyVP(); return; }
  const minX = Math.min(...visible.map(n => n.x));
  const minY = Math.min(...visible.map(n => n.y));
  const maxX = Math.max(...visible.map(n => n.x + (n.w || NODE_W)));
  const maxY = Math.max(...visible.map(n => n.y + (n.h || NODE_H)));
  const wrapper = document.getElementById('canvas-wrapper');
  const pw = wrapper.clientWidth - 80;
  const ph = wrapper.clientHeight - 80;
  const dw = maxX - minX || 1;
  const dh = maxY - minY || 1;
  const scale = Math.min(1.5, Math.min(pw / dw, ph / dh));
  vp.scale = scale;
  vp.x = (pw - dw * scale) / 2 + 40 - minX * scale;
  vp.y = (ph - dh * scale) / 2 + 40 - minY * scale;
  applyVP();
}

// ═══════════════════════════════════════════════════════════
// INTERACTION STATE
// ═══════════════════════════════════════════════════════════
let tool = 'select';
let spaceDown = false;
let dragging = null;    // { nodeId, startSX, startSY, origX, origY, moved }
let arrowDraw = null;   // { fromId }
let panning = null;     // { startX, startY, origVX, origVY }
let selectedId = null;
let ctxNodeId = null;
let clickTimer = null;

function setTool(t) {
  tool = t;
  document.getElementById('tool-select').classList.toggle('active', t === 'select');
  document.getElementById('tool-pan').classList.toggle('active', t === 'pan');
  document.getElementById('canvas-wrapper').style.cursor = t === 'pan' ? 'grab' : 'default';
}

// ═══════════════════════════════════════════════════════════
// GEOMETRY HELPERS
// ═══════════════════════════════════════════════════════════
function snap(v) { return Math.round(v / GRID) * GRID; }

function nodeRect(node) {
  return { x: node.x, y: node.y, w: node.w || NODE_W, h: node.h || NODE_H };
}

function rectCenter(r) {
  return { x: r.x + r.w / 2, y: r.y + r.h / 2 };
}

// Point on border of rect r closest to (tx,ty)
function borderPoint(r, tx, ty) {
  const cx = r.x + r.w / 2, cy = r.y + r.h / 2;
  const dx = tx - cx, dy = ty - cy;
  if (!dx && !dy) return { x: cx, y: r.y };
  const sx = r.w / 2 / (Math.abs(dx) || 0.001);
  const sy = r.h / 2 / (Math.abs(dy) || 0.001);
  const s = Math.min(sx, sy);
  return { x: cx + dx * s, y: cy + dy * s };
}

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// ═══════════════════════════════════════════════════════════
// COLLAPSE / EXPAND
// ═══════════════════════════════════════════════════════════
function directChildren(diag, nodeId) {
  return diag.edges
    .filter(e => e.fromId === nodeId && e.toId && !e.crossTab)
    .map(e => e.toId);
}

function allDescendants(diag, nodeId) {
  const visited = new Set();
  const q = directChildren(diag, nodeId);
  while (q.length) {
    const id = q.shift();
    if (visited.has(id)) continue;
    visited.add(id);
    directChildren(diag, id).forEach(c => q.push(c));
  }
  return [...visited];
}

// A node is hidden when any of its ancestors is collapsed
function isHidden(diag, nodeId) {
  for (const node of diag.nodes) {
    if (!node.collapsed) continue;
    const desc = allDescendants(diag, node.id);
    if (desc.includes(nodeId)) return true;
  }
  return false;
}

// Find the visible collapsed ancestor to draw arrows toward
function collapsedAncestor(diag, nodeId) {
  const visited = new Set();
  const q = [nodeId];
  while (q.length) {
    const id = q.shift();
    if (visited.has(id)) continue;
    visited.add(id);
    for (const e of diag.edges) {
      if (e.toId !== id || e.crossTab) continue;
      const p = diag.nodes.find(n => n.id === e.fromId);
      if (!p) continue;
      if (!isHidden(diag, p.id)) return p;
      q.push(p.id);
    }
  }
  return null;
}

function toggleCollapse(nodeId) {
  const diag = activeDiagram();
  const node = diag.nodes.find(n => n.id === nodeId);
  if (!node) return;
  const kids = directChildren(diag, nodeId);
  if (!kids.length) return;

  pushHistory();

  if (!node.collapsed) {
    // Save positions of ALL descendants
    const desc = allDescendants(diag, nodeId);
    node.savedChildrenPositions = {};
    desc.forEach(id => {
      const n = diag.nodes.find(x => x.id === id);
      if (n) node.savedChildrenPositions[id] = { x: n.x, y: n.y };
    });
    node.collapsed = true;
  } else {
    // Restore positions
    if (node.savedChildrenPositions && Object.keys(node.savedChildrenPositions).length) {
      Object.entries(node.savedChildrenPositions).forEach(([id, pos]) => {
        const n = diag.nodes.find(x => x.id === id);
        if (n) { n.x = pos.x; n.y = pos.y; }
      });
    } else {
      // Auto-place direct children below parent
      const r = nodeRect(node);
      kids.forEach((cid, i) => {
        const cn = diag.nodes.find(x => x.id === cid);
        if (cn) {
          cn.x = snap(r.x + i * (NODE_W + GRID * 2));
          cn.y = snap(r.y + r.h + GRID * 5);
        }
      });
    }
    node.collapsed = false;
    node.savedChildrenPositions = {};

    // Push away overlapping visible nodes
    resolveOverlaps(diag, nodeId);
  }

  save(); render();
}

function resolveOverlaps(diag, expandedId) {
  const expandedSet = new Set(allDescendants(diag, expandedId));
  // Parent is fixed — never moves during expansion
  const fixedSet = new Set([expandedId]);
  const allVisible = diag.nodes.filter(n => !isHidden(diag, n.id));
  const PAD = GRID; // minimum gap enforced between nodes

  for (let iter = 0; iter < 40; iter++) {
    let anyMoved = false;

    for (let i = 0; i < allVisible.length; i++) {
      for (let j = i + 1; j < allVisible.length; j++) {
        const a = allVisible[i];
        const b = allVisible[j];

        const aFixed = fixedSet.has(a.id);
        const bFixed = fixedSet.has(b.id);
        if (aFixed && bFixed) continue;

        const aExp = expandedSet.has(a.id);
        const bExp = expandedSet.has(b.id);
        const aCanMove = !aFixed;
        const bCanMove = !bFixed;

        const aw = a.w || NODE_W, ah = a.h || NODE_H;
        const bw = b.w || NODE_W, bh = b.h || NODE_H;

        // Raw overlap on each axis (positive = overlapping)
        const ox = Math.min(a.x + aw, b.x + bw) - Math.max(a.x, b.x);
        const oy = Math.min(a.y + ah, b.y + bh) - Math.max(a.y, b.y);
        if (ox <= 0 || oy <= 0) continue;

        anyMoved = true;

        // Separate along the axis with smaller overlap (least movement needed)
        if (ox <= oy) {
          // Horizontal separation
          const dir = (b.x + bw / 2) >= (a.x + aw / 2) ? 1 : -1;
          const push = Math.ceil((ox + PAD) / GRID) * GRID;
          if (aCanMove && bCanMove) {
            if (aExp && !bExp) {
              b.x += dir * push;       // expanded a pushes pre-existing b
            } else if (bExp && !aExp) {
              a.x -= dir * push;       // expanded b pushes pre-existing a
            } else {
              // Both same kind — split evenly
              const half = Math.ceil(push / 2 / GRID) * GRID;
              a.x -= dir * half;
              b.x += dir * half;
            }
          } else if (aCanMove) {
            a.x -= dir * push;         // b is fixed, move a
          } else {
            b.x += dir * push;         // a is fixed, move b
          }
        } else {
          // Vertical separation
          const dir = (b.y + bh / 2) >= (a.y + ah / 2) ? 1 : -1;
          const push = Math.ceil((oy + PAD) / GRID) * GRID;
          if (aCanMove && bCanMove) {
            if (aExp && !bExp) {
              b.y += dir * push;
            } else if (bExp && !aExp) {
              a.y -= dir * push;
            } else {
              const half = Math.ceil(push / 2 / GRID) * GRID;
              a.y -= dir * half;
              b.y += dir * half;
            }
          } else if (aCanMove) {
            a.y -= dir * push;
          } else {
            b.y += dir * push;
          }
        }
      }
    }

    if (!anyMoved) break; // stable — no more overlaps
  }
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function render() {
  renderNodes();
  renderArrows();
}

function renderNodes() {
  const diag = activeDiagram();
  if (!diag) return;
  const layer = document.getElementById('nodes-layer');

  // Remove stale elements
  layer.querySelectorAll('.node').forEach(el => {
    if (!diag.nodes.find(n => n.id === el.dataset.id)) el.remove();
  });

  diag.nodes.forEach(node => {
    let el = layer.querySelector(`.node[data-id="${node.id}"]`);

    if (!el) {
      el = document.createElement('div');
      el.className = 'node';
      el.dataset.id = node.id;
      el.innerHTML = `
        <div class="node-label"></div>
        <div class="node-badge"></div>
        <div class="handle h-top"    data-dir="top"></div>
        <div class="handle h-bottom" data-dir="bottom"></div>
        <div class="handle h-left"   data-dir="left"></div>
        <div class="handle h-right"  data-dir="right"></div>
      `;
      layer.appendChild(el);
      attachNodeEvents(el);
    }

    const hidden = isHidden(diag, node.id);
    el.style.display = hidden ? 'none' : 'flex';
    if (hidden) return;

    const r = nodeRect(node);
    el.style.left   = r.x + 'px';
    el.style.top    = r.y + 'px';
    el.style.width  = r.w + 'px';
    el.style.minHeight = r.h + 'px';
    el.style.background = node.color || '#ffffff';

    // Set text color based on luminance
    const lum = hexLuminance(node.color || '#ffffff');
    el.style.color = lum > 0.45 ? '#222' : '#eee';
    el.style.borderColor = lum > 0.45 ? '#bbb' : '#555';

    el.classList.toggle('collapsed', !!node.collapsed);
    el.classList.toggle('selected',  node.id === selectedId);

    const label = el.querySelector('.node-label');
    if (label.getAttribute('contenteditable') !== 'true') {
      label.textContent = node.text || '';
    }

    // Collapse badge
    const kids = directChildren(diag, node.id);
    const badge = el.querySelector('.node-badge');
    badge.textContent = (node.collapsed && kids.length) ? `▶ ${kids.length} oculto${kids.length > 1 ? 's' : ''}` : '';

    // Cross-tab badges — rebuild each render
    el.querySelectorAll('.crosstab-out-badge,.crosstab-in-badge').forEach(b => b.remove());

    // Outgoing cross-tab edges from this node
    diag.edges.filter(e => e.fromId === node.id && e.crossTab).forEach(edge => {
      const td = state.diagrams.find(d => d.id === edge.crossTab.diagramId);
      if (!td) return;
      const b = document.createElement('div');
      b.className = 'crosstab-out-badge';
      b.textContent = `→ ${td.name}`;
      b.dataset.edgeId = edge.id;
      b.addEventListener('click', ev => { ev.stopPropagation(); navigateCrossTab(edge); });
      el.appendChild(b);
    });

    // Incoming cross-tab edges from other diagrams
    state.diagrams.forEach(od => {
      if (od.id === diag.id) return;
      od.edges.filter(e => e.crossTab && e.crossTab.diagramId === diag.id && e.crossTab.nodeId === node.id)
        .forEach(() => {
          const b = document.createElement('div');
          b.className = 'crosstab-in-badge';
          b.textContent = `← ${od.name}`;
          el.appendChild(b);
        });
    });
  });
}

function renderArrows() {
  const diag = activeDiagram();
  if (!diag) return;
  const group = document.getElementById('edges-group');
  group.innerHTML = '';

  diag.edges.forEach(edge => {
    if (edge.crossTab) return; // cross-tab shown as badge on node

    const fn = diag.nodes.find(n => n.id === edge.fromId);
    let tn = diag.nodes.find(n => n.id === edge.toId);
    if (!fn || !tn) return;
    if (isHidden(diag, fn.id)) return;

    // If toNode is hidden, draw arrow toward its collapsed ancestor
    if (isHidden(diag, tn.id)) {
      tn = collapsedAncestor(diag, tn.id);
      if (!tn) return;
    }

    const fr = nodeRect(fn), tr = nodeRect(tn);
    const fc = rectCenter(fr), tc = rectCenter(tr);
    const fp = borderPoint(fr, tc.x, tc.y);
    const tp = borderPoint(tr, fc.x, fc.y);

    const dist = Math.hypot(tp.x - fp.x, tp.y - fp.y);
    const bend = Math.min(120, dist * 0.4);

    const fdx = fp.x - fc.x, fdy = fp.y - fc.y;
    const fL = Math.hypot(fdx, fdy) || 1;
    const h1x = fp.x + (fdx / fL) * bend;
    const h1y = fp.y + (fdy / fL) * bend;

    const tdx = tp.x - tc.x, tdy = tp.y - tc.y;
    const tL = Math.hypot(tdx, tdy) || 1;
    const h2x = tp.x + (tdx / tL) * bend;
    const h2y = tp.y + (tdy / tL) * bend;

    const pathD = `M ${fp.x} ${fp.y} C ${h1x} ${h1y}, ${h2x} ${h2y}, ${tp.x} ${tp.y}`;

    // Invisible thick hit area
    const hit = makeSVGEl('path', {
      d: pathD, stroke: 'transparent', 'stroke-width': '16',
      fill: 'none', cursor: 'pointer'
    });
    hit.style.pointerEvents = 'stroke';
    hit.dataset.edgeId = edge.id;

    const path = makeSVGEl('path', {
      d: pathD, stroke: '#666', 'stroke-width': '2',
      fill: 'none', 'marker-end': 'url(#arr)',
      'pointer-events': 'none'
    });

    hit.addEventListener('mouseenter', () => path.setAttribute('stroke', '#e74c3c'));
    hit.addEventListener('mouseleave', () => path.setAttribute('stroke', '#666'));
    hit.addEventListener('click', e => {
      e.stopPropagation();
      if (confirm('¿Eliminar esta flecha?')) {
        pushHistory();
        const d = activeDiagram();
        d.edges = d.edges.filter(ed => ed.id !== edge.id);
        save(); render();
      }
    });

    group.appendChild(path);
    group.appendChild(hit);
  });
}

function makeSVGEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
  return el;
}

function hexLuminance(hex) {
  const c = hex.replace('#', '');
  if (c.length < 6) return 1;
  const r = parseInt(c.slice(0, 2), 16) / 255;
  const g = parseInt(c.slice(2, 4), 16) / 255;
  const b = parseInt(c.slice(4, 6), 16) / 255;
  return 0.2126 * r + 0.7152 * g + 0.0722 * b;
}

// ═══════════════════════════════════════════════════════════
// NODE EVENTS
// ═══════════════════════════════════════════════════════════
function attachNodeEvents(el) {

  // ── Mousedown: start drag ──
  el.addEventListener('mousedown', e => {
    if (e.target.classList.contains('handle')) return;
    if (e.target.classList.contains('crosstab-out-badge')) return;
    if (e.button !== 0) return;
    e.stopPropagation();

    const nodeId = el.dataset.id;
    const node = activeDiagram().nodes.find(n => n.id === nodeId);
    if (!node) return;

    dragging = {
      nodeId,
      startSX: e.clientX, startSY: e.clientY,
      origX: node.x, origY: node.y,
      moved: false
    };
  });

  // ── Double-click: edit text ──
  el.addEventListener('dblclick', e => {
    if (e.target.classList.contains('handle')) return;
    e.stopPropagation();
    startEditLabel(el);
  });

  // ── Right-click: context menu ──
  el.addEventListener('contextmenu', e => {
    e.preventDefault(); e.stopPropagation();
    ctxNodeId = el.dataset.id;
    showContextMenu(e.clientX, e.clientY);
  });

  // ── Handle mousedown: start arrow draw ──
  el.querySelectorAll('.handle').forEach(handle => {
    handle.addEventListener('mousedown', e => {
      e.stopPropagation(); e.preventDefault();
      arrowDraw = { fromId: el.dataset.id };
    });
  });
}

function startEditLabel(el) {
  const label = el.querySelector('.node-label');
  label.setAttribute('contenteditable', 'true');
  label.focus();
  const range = document.createRange();
  range.selectNodeContents(label);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);
}

// Shared label blur handler (attached once via delegation)
document.getElementById('nodes-layer').addEventListener('focusout', e => {
  const label = e.target;
  if (!label.classList.contains('node-label')) return;
  label.setAttribute('contenteditable', 'false');
  const el = label.closest('.node');
  if (!el) return;
  const node = activeDiagram().nodes.find(n => n.id === el.dataset.id);
  if (!node) return;
  const newText = label.textContent.trim();
  if (newText !== node.text) {
    pushHistory();
    node.text = newText;
    save();
  }
});

document.getElementById('nodes-layer').addEventListener('keydown', e => {
  const label = e.target;
  if (!label.classList.contains('node-label')) return;
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); label.blur(); }
  e.stopPropagation();
});

// ═══════════════════════════════════════════════════════════
// CANVAS EVENTS
// ═══════════════════════════════════════════════════════════
const wrapper = document.getElementById('canvas-wrapper');

wrapper.addEventListener('mousedown', e => {
  hideContextMenu();

  // Middle mouse → pan
  if (e.button === 1) {
    e.preventDefault();
    panning = { startX: e.clientX, startY: e.clientY, origVX: vp.x, origVY: vp.y };
    return;
  }
  if (e.button !== 0) return;

  // On canvas background → maybe pan or deselect
  const onBackground =
    e.target === document.getElementById('canvas') ||
    e.target === document.getElementById('nodes-layer') ||
    e.target === document.getElementById('arrows-layer') ||
    e.target.closest('#edges-group');

  if (onBackground) {
    if (tool === 'pan' || spaceDown) {
      panning = { startX: e.clientX, startY: e.clientY, origVX: vp.x, origVY: vp.y };
      wrapper.style.cursor = 'grabbing';
    }
    if (selectedId) { selectedId = null; render(); }
  }
});

wrapper.addEventListener('dblclick', e => {
  const onBackground =
    e.target === document.getElementById('canvas') ||
    e.target === document.getElementById('nodes-layer') ||
    e.target === document.getElementById('arrows-layer');
  if (!onBackground) return;
  const pos = screenToCanvas(e.clientX, e.clientY);
  createNode(snap(pos.x - NODE_W / 2), snap(pos.y - NODE_H / 2));
});

wrapper.addEventListener('mousemove', e => {
  if (panning) {
    vp.x = panning.origVX + (e.clientX - panning.startX);
    vp.y = panning.origVY + (e.clientY - panning.startY);
    applyVP();
    return;
  }

  if (dragging) {
    const dx = (e.clientX - dragging.startSX) / vp.scale;
    const dy = (e.clientY - dragging.startSY) / vp.scale;
    if (!dragging.moved && Math.hypot(dx, dy) > 4) dragging.moved = true;
    if (dragging.moved) {
      const node = activeDiagram().nodes.find(n => n.id === dragging.nodeId);
      if (node) { node.x = dragging.origX + dx; node.y = dragging.origY + dy; render(); }
    }
    return;
  }

  if (arrowDraw) {
    const pos = screenToCanvas(e.clientX, e.clientY);
    const fromNode = activeDiagram().nodes.find(n => n.id === arrowDraw.fromId);
    if (fromNode) {
      const fr = nodeRect(fromNode);
      const fp = borderPoint(fr, pos.x, pos.y);
      document.getElementById('arrow-preview')
        .setAttribute('d', `M ${fp.x} ${fp.y} L ${pos.x} ${pos.y}`);
    }
  }
});

wrapper.addEventListener('mouseup', e => {
  if (panning) {
    panning = null;
    wrapper.style.cursor = tool === 'pan' ? 'grab' : 'default';
    return;
  }

  if (dragging) {
    const diag = activeDiagram();
    const node = diag.nodes.find(n => n.id === dragging.nodeId);

    if (dragging.moved && node) {
      node.x = snap(node.x);
      node.y = snap(node.y);
      pushHistory();
      save(); render();
    } else if (!dragging.moved && node) {
      selectedId = dragging.nodeId;
      if (e.metaKey || e.ctrlKey) {
        toggleCollapse(dragging.nodeId);
      } else {
        render();
      }
    }
    dragging = null;
    return;
  }

  if (arrowDraw) {
    document.getElementById('arrow-preview').setAttribute('d', '');
    const pos = screenToCanvas(e.clientX, e.clientY);
    const diag = activeDiagram();
    const target = diag.nodes.find(n => {
      if (n.id === arrowDraw.fromId) return false;
      if (isHidden(diag, n.id)) return false;
      const r = nodeRect(n);
      return pos.x >= r.x && pos.x <= r.x + r.w && pos.y >= r.y && pos.y <= r.y + r.h;
    });
    if (target) {
      // Avoid duplicate edges
      const exists = diag.edges.some(ed => ed.fromId === arrowDraw.fromId && ed.toId === target.id && !ed.crossTab);
      if (!exists) {
        pushHistory();
        diag.edges.push({ id: uid(), fromId: arrowDraw.fromId, toId: target.id, label: '', crossTab: null });
        save(); render();
      }
    }
    arrowDraw = null;
  }
});

wrapper.addEventListener('wheel', e => {
  e.preventDefault();
  const r = wrapper.getBoundingClientRect();
  const mx = e.clientX - r.left;
  const my = e.clientY - r.top;
  const factor = e.deltaY > 0 ? 0.88 : 1.12;
  const newScale = Math.max(0.08, Math.min(5, vp.scale * factor));
  vp.x = mx - (mx - vp.x) * (newScale / vp.scale);
  vp.y = my - (my - vp.y) * (newScale / vp.scale);
  vp.scale = newScale;
  applyVP();
}, { passive: false });

// ═══════════════════════════════════════════════════════════
// CREATE NODE
// ═══════════════════════════════════════════════════════════
function createNode(x, y) {
  pushHistory();
  const node = {
    id: uid(), x, y, w: NODE_W, h: NODE_H,
    text: 'Nodo', color: '#ffffff',
    collapsed: false, savedChildrenPositions: {}
  };
  activeDiagram().nodes.push(node);
  save(); render();
  setTimeout(() => {
    const el = document.querySelector(`.node[data-id="${node.id}"]`);
    if (el) startEditLabel(el);
  }, 30);
}

// ═══════════════════════════════════════════════════════════
// CONTEXT MENU
// ═══════════════════════════════════════════════════════════
function showContextMenu(x, y) {
  const m = document.getElementById('context-menu');
  m.style.display = 'block';
  m.style.left = x + 'px';
  m.style.top  = y + 'px';
  requestAnimationFrame(() => {
    const r = m.getBoundingClientRect();
    if (r.right  > window.innerWidth)  m.style.left = (x - r.width)  + 'px';
    if (r.bottom > window.innerHeight) m.style.top  = (y - r.height) + 'px';
  });
}

function hideContextMenu() {
  document.getElementById('context-menu').style.display = 'none';
}

document.addEventListener('mousedown', e => {
  if (!document.getElementById('context-menu').contains(e.target)) hideContextMenu();
});

document.getElementById('ctx-edit').addEventListener('click', () => {
  const el = document.querySelector(`.node[data-id="${ctxNodeId}"]`);
  if (el) startEditLabel(el);
  hideContextMenu();
});

document.getElementById('ctx-delete').addEventListener('click', () => {
  if (!ctxNodeId) return;
  deleteNode(ctxNodeId);
  ctxNodeId = null;
  hideContextMenu();
});

document.getElementById('ctx-crosstab').addEventListener('click', () => {
  const fromId = ctxNodeId;
  hideContextMenu();
  openCrossTabModal(fromId);
});

// Color palette init
(function() {
  const palette = document.getElementById('ctx-colors');
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch';
    sw.style.background = c;
    sw.title = c;
    sw.addEventListener('click', () => applyColor(c));
    palette.appendChild(sw);
  });
})();

function applyColor(c) {
  if (!ctxNodeId) return;
  pushHistory();
  const node = activeDiagram().nodes.find(n => n.id === ctxNodeId);
  if (node) { node.color = c; save(); render(); }
  hideContextMenu();
}

document.getElementById('ctx-color-input').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const val = e.target.value.trim();
  if (/^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/.test(val)) applyColor(val);
});

// ═══════════════════════════════════════════════════════════
// DELETE NODE
// ═══════════════════════════════════════════════════════════
function deleteNode(nodeId) {
  pushHistory();
  const diag = activeDiagram();
  diag.nodes = diag.nodes.filter(n => n.id !== nodeId);
  diag.edges = diag.edges.filter(e => e.fromId !== nodeId && e.toId !== nodeId);
  // Remove cross-tab references from other diagrams pointing to this node
  state.diagrams.forEach(d => {
    d.edges = d.edges.filter(e =>
      !(e.crossTab && e.crossTab.diagramId === diag.id && e.crossTab.nodeId === nodeId)
    );
  });
  if (selectedId === nodeId) selectedId = null;
  save(); render();
}

// ═══════════════════════════════════════════════════════════
// CROSS-TAB LINKS
// ═══════════════════════════════════════════════════════════
function openCrossTabModal(fromNodeId) {
  const diag = activeDiagram();
  const others = state.diagrams.filter(d => d.id !== diag.id);
  if (!others.length) {
    alert('Necesitás al menos otra pestaña para crear un link cross-tab.');
    return;
  }

  const tabSel  = document.getElementById('modal-tab-select');
  const nodeSel = document.getElementById('modal-node-select');

  tabSel.innerHTML = '';
  others.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.id; opt.textContent = d.name;
    tabSel.appendChild(opt);
  });

  function refreshNodes() {
    const d = state.diagrams.find(x => x.id === tabSel.value);
    nodeSel.innerHTML = '';
    (d ? d.nodes : []).forEach(n => {
      const opt = document.createElement('option');
      opt.value = n.id;
      opt.textContent = n.text || '(sin texto)';
      nodeSel.appendChild(opt);
    });
  }

  tabSel.onchange = refreshNodes;
  refreshNodes();

  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('open');

  document.getElementById('modal-confirm').onclick = () => {
    const tDiagId = tabSel.value;
    const tNodeId = nodeSel.value;
    if (!tDiagId || !tNodeId) return;
    pushHistory();
    diag.edges.push({ id: uid(), fromId: fromNodeId, toId: null, label: '', crossTab: { diagramId: tDiagId, nodeId: tNodeId } });
    save(); render();
    overlay.classList.remove('open');
  };

  document.getElementById('modal-cancel').onclick = () => overlay.classList.remove('open');
  overlay.onclick = e => { if (e.target === overlay) overlay.classList.remove('open'); };
}

function navigateCrossTab(edge) {
  state.activeDiagramId = edge.crossTab.diagramId;
  save(); renderTabs(); render();
  setTimeout(() => {
    const el = document.querySelector(`.node[data-id="${edge.crossTab.nodeId}"]`);
    if (!el) return;
    el.classList.add('highlighted');
    // Scroll into view inside canvas (adjust viewport)
    const node = activeDiagram().nodes.find(n => n.id === edge.crossTab.nodeId);
    if (node) {
      const wr = wrapper.getBoundingClientRect();
      vp.x = wr.width / 2 - node.x * vp.scale - (NODE_W * vp.scale) / 2;
      vp.y = wr.height / 2 - node.y * vp.scale - (NODE_H * vp.scale) / 2;
      applyVP();
    }
    setTimeout(() => el.classList.remove('highlighted'), 2400);
  }, 80);
}

// ═══════════════════════════════════════════════════════════
// TAB MANAGEMENT
// ═══════════════════════════════════════════════════════════
function renderTabs() {
  const bar = document.getElementById('tab-bar');
  bar.querySelectorAll('.tab').forEach(t => t.remove());

  state.diagrams.forEach(diag => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (diag.id === state.activeDiagramId ? ' active' : '');
    tab.dataset.id = diag.id;

    const nameEl = document.createElement('span');
    nameEl.className = 'tab-name';
    nameEl.textContent = diag.name;
    nameEl.title = diag.name;

    const closeBtn = document.createElement('span');
    closeBtn.className = 'tab-close';
    closeBtn.innerHTML = '&times;';
    closeBtn.title = 'Eliminar diagrama';

    tab.appendChild(nameEl);
    tab.appendChild(closeBtn);
    bar.insertBefore(tab, document.getElementById('tab-add'));

    tab.addEventListener('click', e => {
      if (e.target === closeBtn) return;
      state.activeDiagramId = diag.id;
      save(); renderTabs(); render();
    });

    nameEl.addEventListener('dblclick', e => {
      e.stopPropagation();
      nameEl.setAttribute('contenteditable', 'true');
      nameEl.focus();
      const range = document.createRange();
      range.selectNodeContents(nameEl);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);
    });

    nameEl.addEventListener('blur', () => {
      nameEl.setAttribute('contenteditable', 'false');
      const txt = nameEl.textContent.trim() || diag.name;
      if (txt !== diag.name) { pushHistory(); diag.name = txt; save(); render(); }
    });

    nameEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); nameEl.blur(); }
      e.stopPropagation();
    });

    closeBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (state.diagrams.length === 1) { alert('No podés eliminar el único diagrama.'); return; }
      if (!confirm(`¿Eliminar "${diag.name}"?`)) return;
      pushHistory();
      state.diagrams.forEach(d => {
        d.edges = d.edges.filter(ed => !ed.crossTab || ed.crossTab.diagramId !== diag.id);
      });
      state.diagrams = state.diagrams.filter(d => d.id !== diag.id);
      if (state.activeDiagramId === diag.id) state.activeDiagramId = state.diagrams[0].id;
      save(); renderTabs(); render();
    });
  });
}

document.getElementById('tab-add').addEventListener('click', () => {
  pushHistory();
  const d = makeDiagram(`Diagrama ${state.diagrams.length + 1}`);
  state.diagrams.push(d);
  state.activeDiagramId = d.id;
  save(); renderTabs(); render();
});

// ═══════════════════════════════════════════════════════════
// TOOLBAR
// ═══════════════════════════════════════════════════════════
document.getElementById('tool-select').addEventListener('click', () => setTool('select'));
document.getElementById('tool-pan').addEventListener('click', () => setTool('pan'));
document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-redo').addEventListener('click', redo);
document.getElementById('btn-fit').addEventListener('click', fitView);

document.getElementById('btn-delete').addEventListener('click', () => {
  if (!selectedId) return;
  deleteNode(selectedId);
});

// ═══════════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  const editing = document.querySelector('[contenteditable="true"]');
  if (editing) return;

  if (e.key === ' ') { e.preventDefault(); spaceDown = true; if (!panning) wrapper.style.cursor = 'grab'; }

  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
    if (e.key === 'z' && e.shiftKey)  { e.preventDefault(); redo(); return; }
    if (e.key === 'y')                { e.preventDefault(); redo(); return; }
    if (e.key === 't')                { e.preventDefault(); document.getElementById('tab-add').click(); return; }
    if (e.key === 'H' && e.shiftKey)  { e.preventDefault(); fitView(); return; }
  }

  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (selectedId) { deleteNode(selectedId); }
    return;
  }

  if (e.key === 'v' || e.key === 'V') setTool('select');
  if (e.key === 'h' || e.key === 'H') setTool('pan');
  if (e.key === 'Escape') { selectedId = null; render(); }
});

document.addEventListener('keyup', e => {
  if (e.key === ' ') {
    spaceDown = false;
    if (!panning) wrapper.style.cursor = tool === 'pan' ? 'grab' : 'default';
  }
});

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
(async () => {
  await load();
  renderTabs();
  render();
  applyVP();
})();
</script>
</body>
</html>
